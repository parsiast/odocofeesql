services:
  backend:
    dns:
      - 8.8.8.8
      - 1.1.1.1
    build: .
    container_name: django_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: odosql.settings.development

    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy


  db:
    image: mysql:8.0
    container_name: odosql
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: "Parsia1377"
      MYSQL_DATABASE: "odosql"
    ports:
      - "3310:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  mysql_data:

